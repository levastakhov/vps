name: VPS Tailscale

on: workflow_dispatch

jobs:
  start-node:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale
        run: curl -fsSL https://tailscale.com/install.sh | sh

      # Добавленный шаг: удаление старой машины с таким же именем
      - name: Cleanup old machine
        run: |
          # Используем API для поиска и удаления машины по имени
          # ВАЖНО: вам понадобится TAILSCALE_API_KEY в Secrets
          curl -X DELETE "https://api.tailscale.com/api/v2/tailnet/-/devices/github-vps" \
          -u "${{ secrets.TAILSCALE_API_KEY }}:" || echo "Старая машина не найдена, продолжаем..."

      - name: Configure IP Forwarding
        run: |
          echo 'net.ipv4.ip_forward = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf
          echo 'net.ipv6.conf.all.forwarding = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf
          sudo sysctl -p /etc/sysctl.d/99-tailscale.conf

      - name: Start Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
                           --advertise-exit-node \
                           --accept-routes \
                           --hostname=github-vps

      - name: Start SSH
        uses: mxschmitt/action-tmate@v3
