name: VPS Tailscale

on: workflow_dispatch

jobs:
  start-node:
    runs-on: ubuntu-latest
    steps:
      - name: Install Tailscale & jq
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo apt-get install -y jq

      # Автоматическое удаление старой машины с именем github-vps перед запуском новой
      - name: Cleanup old machine
        run: |
          curl -s -u "${{ secrets.TAILSCALE_API_KEY }}:" \
          "https://api.tailscale.com/api/v2/tailnet/-/devices" | \
          jq -r '.devices[] | select(.hostname=="github-vps") | .id' | \
          xargs -I {} curl -X DELETE -u "${{ secrets.TAILSCALE_API_KEY }}:" \
          "https://api.tailscale.com/api/v2/device/{}" || echo "Старых записей нет."

      - name: Configure IP Forwarding
        run: |
          echo 'net.ipv4.ip_forward = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf
          echo 'net.ipv6.conf.all.forwarding = 1' | sudo tee -a /etc/sysctl.d/99-tailscale.conf
          sudo sysctl -p /etc/sysctl.d/99-tailscale.conf

      - name: Start Tailscale
        run: |
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} \
                           --advertise-exit-node \
                           --accept-routes \
                           --hostname=github-vps \
                           --non-interactive

      - name: Start SSH
        uses: mxschmitt/action-tmate@v3
